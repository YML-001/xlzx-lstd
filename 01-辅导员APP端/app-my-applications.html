<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的申请 - 心理中心绿色通道</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#3087CC', light: '#E3F1F9', dark: '#006DAD' },
            success: { DEFAULT: '#1BB975', light: '#E8FCF4' },
            warning: { DEFAULT: '#F29100', light: '#FFF5E5' },
            error: { DEFAULT: '#DF2027', light: '#FCE8EA' },
            txt: { primary: '#3C444F', secondary: '#696F7D', muted: '#9096A2' },
            placeholder: '#ABB0BA',
            border: '#C8CAD1',
            bg: '#FAFAFA',
            card: '#FFFFFF',
          },
          fontFamily: {
            sans: ["'OPPOSans'", '-apple-system', "'PingFang SC'", "'Microsoft YaHei'", 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 3px rgba(0,0,0,0.06)',
          },
        },
      },
    }
  </script>
  <style>
    .mobile-frame {
      width: 375px;
      min-height: 100vh;
      margin: 0 auto;
      background: #FAFAFA;
      position: relative;
      overflow-x: hidden;
    }
    @media (min-width: 376px) {
      body { background: #E8ECF0; }
      .mobile-frame {
        margin-top: 24px;
        margin-bottom: 24px;
        min-height: calc(100vh - 48px);
        border-radius: 24px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.08);
        overflow: hidden;
      }
    }
    .status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 28px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
      border-width: 1px;
      border-style: solid;
    }
    .tab-pills::-webkit-scrollbar { display: none; }
    .tab-pills { -ms-overflow-style: none; scrollbar-width: none; }
    .app-card:active { background: #F7F8FA; }
  </style>
</head>
<body class="font-sans text-txt-primary">

<div class="mobile-frame flex flex-col">

  <!-- Header -->
  <header class="flex items-center h-11 px-4 bg-white border-b border-border flex-shrink-0 sticky top-0 z-20">
    <a href="app-home-counselor.html" class="flex items-center justify-center w-8 h-8 -ml-1 text-txt-primary">
      <i class="fa-solid fa-chevron-left text-sm"></i>
    </a>
    <h1 class="flex-1 text-center text-base font-semibold pr-8">我的申请</h1>
  </header>

  <!-- Tab filter pills -->
  <div class="bg-white border-b border-border flex-shrink-0 px-4 py-3">
    <div class="tab-pills flex gap-2 overflow-x-auto">
      <button onclick="filterCards('all')" data-tab="all"
        class="tab-pill active-pill whitespace-nowrap px-4 h-8 rounded-full text-sm font-medium transition-colors duration-200"
        style="background:#3087CC;color:#fff;">
        全部
      </button>
      <button onclick="filterCards('pending')" data-tab="pending"
        class="tab-pill whitespace-nowrap px-4 h-8 rounded-full text-sm font-medium transition-colors duration-200"
        style="background:#F1F2F3;color:#696F7D;">
        待审核
      </button>
      <button onclick="filterCards('approved')" data-tab="approved"
        class="tab-pill whitespace-nowrap px-4 h-8 rounded-full text-sm font-medium transition-colors duration-200"
        style="background:#F1F2F3;color:#696F7D;">
        已通过
      </button>
      <button onclick="filterCards('rejected')" data-tab="rejected"
        class="tab-pill whitespace-nowrap px-4 h-8 rounded-full text-sm font-medium transition-colors duration-200"
        style="background:#F1F2F3;color:#696F7D;">
        已驳回
      </button>
    </div>
  </div>

  <!-- Application list -->
  <div class="flex-1 px-4 pt-3 pb-6" id="cardList">

    <!-- Card 1: 李明 - 待审核 -->
    <a href="app-application-detail.html" class="app-card block bg-card rounded-lg shadow-card p-4 mb-3 transition-colors duration-150" data-status="pending">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0 mr-3">
          <div class="text-[15px] font-semibold text-txt-primary leading-snug">李明</div>
          <div class="text-[13px] text-txt-secondary mt-1">信息科学与工程学院</div>
          <div class="text-xs text-txt-muted mt-1">2025-05-10</div>
        </div>
        <span class="status-tag" style="background:#FFF5E5;color:#F29100;border-color:#FFE0B3;">待审核</span>
      </div>
    </a>

    <!-- Card 2: 王华 - 已通过 -->
    <a href="app-application-detail.html" class="app-card block bg-card rounded-lg shadow-card p-4 mb-3 transition-colors duration-150" data-status="approved">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0 mr-3">
          <div class="text-[15px] font-semibold text-txt-primary leading-snug">王华</div>
          <div class="text-[13px] text-txt-secondary mt-1">计算机学院</div>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-txt-muted">2025-05-08</span>
            <span class="text-xs text-primary font-medium">编号: 第023号</span>
          </div>
        </div>
        <span class="status-tag" style="background:#E8FCF4;color:#1BB975;border-color:#A7F3D0;">已通过</span>
      </div>
    </a>

    <!-- Card 3: 陈静 - 已驳回 -->
    <a href="app-application-detail.html" class="app-card block bg-card rounded-lg shadow-card p-4 mb-3 transition-colors duration-150" data-status="rejected">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0 mr-3">
          <div class="text-[15px] font-semibold text-txt-primary leading-snug">陈静</div>
          <div class="text-[13px] text-txt-secondary mt-1">外国语学院</div>
          <div class="text-xs text-txt-muted mt-1">2025-05-06</div>
        </div>
        <div class="flex flex-col items-end gap-2">
          <span class="status-tag" style="background:#FCE8EA;color:#DF2027;border-color:#F6BCBE;">已驳回</span>
          <span onclick="event.preventDefault();event.stopPropagation();location.href='app-application-edit.html'"
            class="text-xs text-primary font-medium hover:underline cursor-pointer">修改 →</span>
        </div>
      </div>
    </a>

    <!-- Card 4: 刘洋 - 已通过 -->
    <a href="app-application-detail.html" class="app-card block bg-card rounded-lg shadow-card p-4 mb-3 transition-colors duration-150" data-status="approved">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0 mr-3">
          <div class="text-[15px] font-semibold text-txt-primary leading-snug">刘洋</div>
          <div class="text-[13px] text-txt-secondary mt-1">商学院</div>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-txt-muted">2025-05-03</span>
            <span class="text-xs text-primary font-medium">编号: 第022号</span>
          </div>
        </div>
        <span class="status-tag" style="background:#E8FCF4;color:#1BB975;border-color:#A7F3D0;">已通过</span>
      </div>
    </a>

    <!-- Card 5: 赵敏 - 已通过 -->
    <a href="app-application-detail.html" class="app-card block bg-card rounded-lg shadow-card p-4 mb-3 transition-colors duration-150" data-status="approved">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0 mr-3">
          <div class="text-[15px] font-semibold text-txt-primary leading-snug">赵敏</div>
          <div class="text-[13px] text-txt-secondary mt-1">数学与统计学院</div>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-txt-muted">2025-04-28</span>
            <span class="text-xs text-primary font-medium">编号: 第021号</span>
          </div>
        </div>
        <span class="status-tag" style="background:#E8FCF4;color:#1BB975;border-color:#A7F3D0;">已通过</span>
      </div>
    </a>

    <!-- Empty state (hidden by default) -->
    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16">
      <div class="w-24 h-24 rounded-full bg-primary-light flex items-center justify-center mb-4">
        <i class="fa-regular fa-folder-open text-3xl text-primary"></i>
      </div>
      <p class="text-sm text-txt-muted">暂无申请记录</p>
    </div>

  </div>

  <!-- Back to prototype nav -->
  <div class="flex justify-center py-3 bg-white border-t border-border">
    <a href="../index.html" class="text-xs text-primary hover:underline inline-flex items-center gap-1">
      <i class="fa-solid fa-arrow-left text-[10px]"></i>
      返回原型导航
    </a>
  </div>

</div>

<script>
  function filterCards(status) {
    const cards = document.querySelectorAll('.app-card');
    const empty = document.getElementById('emptyState');
    let visible = 0;

    cards.forEach(card => {
      const cardStatus = card.dataset.status;
      if (status === 'all' || cardStatus === status) {
        card.style.display = '';
        visible++;
      } else {
        card.style.display = 'none';
      }
    });

    empty.classList.toggle('hidden', visible > 0);

    document.querySelectorAll('.tab-pill').forEach(btn => {
      if (btn.dataset.tab === status) {
        btn.style.background = '#3087CC';
        btn.style.color = '#fff';
        btn.classList.add('active-pill');
      } else {
        btn.style.background = '#F1F2F3';
        btn.style.color = '#696F7D';
        btn.classList.remove('active-pill');
      }
    });
  }
</script>

<!-- 返回原型首页 -->
<a href="../index.html" style="position:fixed;left:16px;bottom:16px;z-index:9999;width:36px;height:36px;background:#3087CC;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(48,135,204,0.3);color:#fff;font-size:14px;text-decoration:none;transition:transform .2s;" title="返回原型首页" onmouseenter="this.style.transform='scale(1.1)'" onmouseleave="this.style.transform='scale(1)'"><i class="fa-solid fa-house"></i></a>
</body>
</html>

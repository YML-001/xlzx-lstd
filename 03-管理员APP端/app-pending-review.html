<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>待审批列表 - 心理中心绿色通道</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:      '#3087CC',
            'primary-light': '#E3F1F9',
            'primary-dark':  '#006DAD',
            success:      '#1BB975',
            'success-bg':   '#E8FCF4',
            'success-border':'#A7F3D0',
            warning:      '#F29100',
            'warning-bg':   '#FFF5E5',
            'warning-border':'#FFE0B3',
            error:        '#DF2027',
            'error-bg':     '#FCE8EA',
            'error-border':  '#F6BCBE',
            'text-primary': '#3C444F',
            'text-secondary':'#696F7D',
            'text-muted':   '#9096A2',
            placeholder:  '#ABB0BA',
            border:       '#C8CAD1',
            'page-bg':      '#FAFAFA',
          },
          fontFamily: {
            sans: ["'OPPOSans'", '-apple-system', "'PingFang SC'", "'Microsoft YaHei'", 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 3px rgba(0,0,0,0.06)',
            top:  '0 -1px 4px rgba(0,0,0,0.06)',
          },
          borderRadius: {
            card: '8px',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: #E3F1F9; }
    body { font-family: 'OPPOSans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #FAFAFA; color: #3C444F; }

    .phone-shell {
      width: 375px; min-height: 100vh; margin: 0 auto; position: relative;
      background: #FAFAFA; box-shadow: 0 0 40px rgba(0,0,0,0.12);
    }
    @media (min-width: 500px) {
      html { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
      .phone-shell { min-height: 812px; border-radius: 32px; overflow: hidden; margin: 20px auto; border: 8px solid #1a1a1a; }
    }
    @media (max-width: 499px) {
      .phone-shell { width: 100%; }
    }

    .app-card { transition: all 150ms ease; }
    .app-card:active { background: #F8F8F8; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }

    .filter-pill { transition: all 150ms ease; }
    .filter-pill:active { transform: scale(0.96); }
    .filter-pill.active { background: #3087CC; color: #fff; border-color: #3087CC; }

    .search-box { max-height: 0; overflow: hidden; transition: max-height 300ms ease, opacity 200ms ease; opacity: 0; }
    .search-box.open { max-height: 60px; opacity: 1; }
  </style>
</head>
<body>
  <div class="phone-shell flex flex-col">

    <!-- 顶部导航栏 -->
    <div class="bg-white px-4 pt-12 pb-3 flex items-center justify-between">
      <a href="app-home-admin.html" class="flex items-center gap-2 no-underline text-text-primary">
        <i class="fa-solid fa-arrow-left text-sm"></i>
        <span class="text-base font-bold">待审批列表</span>
      </a>
      <button id="searchToggle" class="w-10 h-10 flex items-center justify-center text-text-secondary">
        <i class="fa-solid fa-magnifying-glass text-base"></i>
      </button>
    </div>

    <!-- 搜索栏（折叠） -->
    <div id="searchBox" class="search-box bg-white px-4">
      <div class="flex items-center bg-page-bg rounded-card h-10 px-3 mb-3">
        <i class="fa-solid fa-magnifying-glass text-sm text-placeholder mr-2"></i>
        <input type="text" placeholder="搜索学生姓名或学院" class="flex-1 bg-transparent text-sm text-text-primary outline-none placeholder:text-placeholder">
      </div>
    </div>

    <!-- 筛选标签 -->
    <div class="bg-white px-4 pb-3 flex items-center gap-2 border-b" style="border-color:#E3F1F9;">
      <button class="filter-pill active px-4 py-1.5 rounded-full text-xs font-medium border border-primary bg-primary text-white" onclick="setFilter(this)">全部待审</button>
      <button class="filter-pill px-4 py-1.5 rounded-full text-xs font-medium border border-border bg-white text-text-secondary" onclick="setFilter(this)">今日</button>
      <button class="filter-pill px-4 py-1.5 rounded-full text-xs font-medium border border-border bg-white text-text-secondary" onclick="setFilter(this)">本周</button>
    </div>

    <!-- 主内容区 -->
    <div class="flex-1 overflow-y-auto pb-[140px]">
      <div class="px-4 pt-3 space-y-3">

        <!-- 卡片 1 -->
        <a href="app-review-detail.html" class="app-card block bg-white rounded-card shadow-card p-4 no-underline">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-[15px] font-medium text-text-primary">李明</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#3087CC; background:#E3F1F9;">首诊</span>
              </div>
              <p class="text-sm text-text-secondary mt-1.5">信息科学与工程学院</p>
              <p class="text-xs text-text-muted mt-1">张老师提交</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="text-xs text-text-muted">2025-05-10</p>
              <p class="text-[11px] text-text-muted mt-0.5">09:30</p>
            </div>
          </div>
        </a>

        <!-- 卡片 2 -->
        <a href="app-review-detail.html" class="app-card block bg-white rounded-card shadow-card p-4 no-underline">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-[15px] font-medium text-text-primary">周芳</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#F29100; background:#FFF5E5;">复诊</span>
              </div>
              <p class="text-sm text-text-secondary mt-1.5">化学化工学院</p>
              <p class="text-xs text-text-muted mt-1">王老师提交</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="text-xs text-text-muted">2025-05-10</p>
              <p class="text-[11px] text-text-muted mt-0.5">08:45</p>
            </div>
          </div>
        </a>

        <!-- 卡片 3 -->
        <a href="app-review-detail.html" class="app-card block bg-white rounded-card shadow-card p-4 no-underline">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-[15px] font-medium text-text-primary">孙磊</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#3087CC; background:#E3F1F9;">首诊</span>
              </div>
              <p class="text-sm text-text-secondary mt-1.5">物理与电子学院</p>
              <p class="text-xs text-text-muted mt-1">刘老师提交</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="text-xs text-text-muted">2025-05-09</p>
              <p class="text-[11px] text-text-muted mt-0.5">16:20</p>
            </div>
          </div>
        </a>

        <!-- 卡片 4 -->
        <a href="app-review-detail.html" class="app-card block bg-white rounded-card shadow-card p-4 no-underline">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-[15px] font-medium text-text-primary">钱丽</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#3087CC; background:#E3F1F9;">首诊</span>
              </div>
              <p class="text-sm text-text-secondary mt-1.5">文学与新闻传播学院</p>
              <p class="text-xs text-text-muted mt-1">赵老师提交</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="text-xs text-text-muted">2025-05-09</p>
              <p class="text-[11px] text-text-muted mt-0.5">14:15</p>
            </div>
          </div>
        </a>

        <!-- 卡片 5 -->
        <a href="app-review-detail.html" class="app-card block bg-white rounded-card shadow-card p-4 no-underline">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-[15px] font-medium text-text-primary">吴迪</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#F29100; background:#FFF5E5;">复诊</span>
              </div>
              <p class="text-sm text-text-secondary mt-1.5">商学院</p>
              <p class="text-xs text-text-muted mt-1">陈老师提交</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="text-xs text-text-muted">2025-05-09</p>
              <p class="text-[11px] text-text-muted mt-0.5">10:30</p>
            </div>
          </div>
        </a>

        <!-- 卡片 6 -->
        <a href="app-review-detail.html" class="app-card block bg-white rounded-card shadow-card p-4 no-underline">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-[15px] font-medium text-text-primary">郑楠</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium" style="color:#3087CC; background:#E3F1F9;">首诊</span>
              </div>
              <p class="text-sm text-text-secondary mt-1.5">数学与统计学院</p>
              <p class="text-xs text-text-muted mt-1">林老师提交</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="text-xs text-text-muted">2025-05-08</p>
              <p class="text-[11px] text-text-muted mt-0.5">17:00</p>
            </div>
          </div>
        </a>

      </div>

      <!-- 返回原型导航 -->
      <div class="px-4 mt-6 mb-4">
        <a href="../index.html" class="inline-flex items-center gap-1.5 text-sm text-text-muted no-underline hover:text-primary transition-colors">
          <i class="fa-solid fa-arrow-left text-xs"></i>
          <span>返回原型导航</span>
        </a>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[375px] bg-white border-t safe-bottom"
         style="border-color: #E3F1F9; box-shadow: 0 -1px 4px rgba(0,0,0,0.06);">
      <div class="flex items-center h-[60px]">
        <a href="app-home-admin.html" class="flex-1 flex flex-col items-center justify-center gap-1 no-underline">
          <i class="fa-solid fa-house text-lg" style="color:#9096A2;"></i>
          <span class="text-xs" style="color:#9096A2;">首页</span>
        </a>
        <a href="app-pending-review.html" class="flex-1 flex flex-col items-center justify-center gap-1 no-underline">
          <i class="fa-solid fa-clipboard-check text-lg" style="color:#3087CC;"></i>
          <span class="text-xs font-medium" style="color:#3087CC;">审批</span>
        </a>
        <a href="app-statistics-mobile.html" class="flex-1 flex flex-col items-center justify-center gap-1 no-underline">
          <i class="fa-solid fa-chart-pie text-lg" style="color:#9096A2;"></i>
          <span class="text-xs" style="color:#9096A2;">统计</span>
        </a>
      </div>
    </div>

  </div>

  <style>
    @media (min-width: 500px) {
      .fixed.bottom-0 { position: absolute; }
    }
  </style>

  <script>
    document.getElementById('searchToggle').addEventListener('click', function() {
      var box = document.getElementById('searchBox');
      box.classList.toggle('open');
      if (box.classList.contains('open')) {
        setTimeout(function() { box.querySelector('input').focus(); }, 200);
      }
    });

    function setFilter(el) {
      document.querySelectorAll('.filter-pill').forEach(function(pill) {
        pill.classList.remove('active');
        pill.style.background = '#fff';
        pill.style.color = '#696F7D';
        pill.style.borderColor = '#C8CAD1';
      });
      el.classList.add('active');
      el.style.background = '#3087CC';
      el.style.color = '#fff';
      el.style.borderColor = '#3087CC';
    }
  </script>
<!-- 返回原型首页 -->
<a href="../index.html" style="position:fixed;left:16px;bottom:16px;z-index:9999;width:36px;height:36px;background:#3087CC;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(48,135,204,0.3);color:#fff;font-size:14px;text-decoration:none;transition:transform .2s;" title="返回原型首页" onmouseenter="this.style.transform='scale(1.1)'" onmouseleave="this.style.transform='scale(1)'"><i class="fa-solid fa-house"></i></a>
</body>
</html>
